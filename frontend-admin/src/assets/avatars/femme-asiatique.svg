<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Fond blanc circulaire -->
  <circle cx="100" cy="100" r="100" fill="white"/>

  <!-- Vêtement — haut couleur corail doux -->
  <ellipse cx="100" cy="195" rx="68" ry="42" fill="#E8856A"/>

  <!-- Cheveux longs noirs — derrière (fond) -->
  <ellipse cx="100" cy="130" rx="50" ry="65" fill="#1A1025"/>
  <!-- Côtés cheveux -->
  <ellipse cx="58" cy="120" rx="16" ry="40" fill="#1A1025"/>
  <ellipse cx="142" cy="120" rx="16" ry="40" fill="#1A1025"/>

  <!-- Cou -->
  <rect x="88" y="138" width="24" height="26" rx="6" fill="#E8C8A0"/>

  <!-- Tête -->
  <ellipse cx="100" cy="110" rx="38" ry="42" fill="#E8C8A0"/>

  <!-- Oreilles -->
  <ellipse cx="62" cy="112" rx="6" ry="8" fill="#E8C8A0"/>
  <ellipse cx="138" cy="112" rx="6" ry="8" fill="#E8C8A0"/>

  <!-- Cheveux noirs — dessus de tête -->
  <ellipse cx="100" cy="74" rx="38" ry="20" fill="#1A1025"/>
  <path d="M62,90 Q62,68 100,64 Q138,68 138,90" fill="#1A1025"/>

  <!-- Raie au milieu légère -->
  <line x1="100" y1="65" x2="100" y2="80" stroke="#0A0515" stroke-width="2"/>

  <!-- Frange légère -->
  <path d="M68,88 Q100,95 132,88 Q130,75 100,72 Q70,75 68,88 Z" fill="#1A1025"/>
</svg>
