<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Fond blanc circulaire -->
  <circle cx="100" cy="100" r="100" fill="white"/>

  <!-- Vêtement / épaules — costume sombre -->
  <ellipse cx="100" cy="195" rx="70" ry="45" fill="#1E2A3A"/>
  <!-- Col costume gauche -->
  <path d="M72,162 L100,178 L100,195 L62,195 L62,172 Z" fill="#162030"/>
  <!-- Col costume droit -->
  <path d="M128,162 L100,178 L100,195 L138,195 L138,172 Z" fill="#162030"/>
  <!-- Chemise blanche entre les cols -->
  <path d="M100,165 L108,178 L100,195 L92,178 Z" fill="#F0F0F0"/>

  <!-- Cou -->
  <rect x="87" y="138" width="26" height="28" rx="6" fill="#3D1A08"/>

  <!-- Tête -->
  <ellipse cx="100" cy="112" rx="40" ry="44" fill="#3D1A08"/>

  <!-- Oreilles -->
  <ellipse cx="60" cy="114" rx="7" ry="9" fill="#3D1A08"/>
  <ellipse cx="140" cy="114" rx="7" ry="9" fill="#3D1A08"/>

  <!-- Cheveux courts — dégradé naturel -->
  <ellipse cx="100" cy="74" rx="40" ry="18" fill="#150800"/>
  <path d="M60,95 Q58,72 100,68 Q142,72 140,95" fill="#150800"/>
  <!-- Contour haut de tête bien net -->
  <ellipse cx="100" cy="76" rx="36" ry="14" fill="#150800"/>
</svg>
