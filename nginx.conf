events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Sécurité ────────────────────────────────────────────────────────────────
  server_tokens off;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ── Rate limiting ────────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m     rate=100r/m;
  limit_req_zone $binary_remote_addr zone=webhook:10m rate=200r/m;

  # ── Gzip ────────────────────────────────────────────────────────────────────
  gzip on;
  gzip_types text/plain application/json application/javascript text/css text/html;

  # ── HTTP → HTTPS ─────────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS principal ───────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;

    # ── Health ──────────────────────────────────────────────────────────────
    location = /health {
      proxy_pass http://backend:3001/health;
      access_log off;
    }

    # ── API Backend ──────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass         http://backend:3001;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      client_max_body_size 10m;
    }

    # ── Webhooks (Twilio, n8n) ───────────────────────────────────────────────
    location /webhook/ {
      limit_req zone=webhook burst=50 nodelay;
      proxy_pass         http://backend:3001;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ── n8n ─────────────────────────────────────────────────────────────────
    location /n8n/ {
      proxy_pass         http://n8n:5678/;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    # ── Frontend Admin (/admin/*) ────────────────────────────────────────────
    location /admin/ {
      alias /usr/share/nginx/html/admin/;
      try_files $uri $uri/ /admin/index.html;
      expires 1h;
    }

    # ── Frontend Owner (/owner/*) ────────────────────────────────────────────
    location /owner/ {
      alias /usr/share/nginx/html/owner/;
      try_files $uri $uri/ /owner/index.html;
      expires 1h;
    }

    # ── Landing page (pixel-perfect) ─────────────────────────────────────────
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
      expires 1h;
    }
  }
}
